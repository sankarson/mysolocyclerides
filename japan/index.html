<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google tag (gtag.js) -->

    <script>
      window.dataLayer = window.dataLayer || [];

      gtag('config', 'G-ZN434ZSEG7');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title"></title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wdth,wght@75,300..800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="../photobook.css">
</head>

<body>

    <header id="header">
        <h1 id="header-title"></h1>
        <p id="header-subtitle"></p>
        <a href="../index.html" class="home-link" title="Home">
            <i class="fas fa-home"></i>
        </a>
    </header>

    <div class="app-content">
        <div class="swiper main-viewer" id="main-viewer">
            <div class="swiper-wrapper" id="main-wrapper"></div>
            <div class="nav-hotspot prev-zone"></div>
            <div class="nav-hotspot next-zone"></div>
            <div class="page-indicator" id="page-indicator"></div>
        </div>

        <div class="swiper thumb-swiper">
            <div class="swiper-wrapper" id="thumb-wrapper"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
        /**
         * --- CONFIGURATION ---
         */
        const CONFIG = {
            country: "Japan",
            year: "2023",
            dates: "24-Mar to 21-Apr, 2023",
            totalImages: 62,
            imagePrefix: "Japan-Page-",
            thumbnailFolder: "thumbnails/"
        };

        document.addEventListener("DOMContentLoaded", () => {
            // Apply Header & Title Variables
            document.title = `${CONFIG.country} ${CONFIG.year}`;
            document.getElementById('header-title').textContent = `${CONFIG.country} ${CONFIG.year}`;
            document.getElementById('header-subtitle').textContent = CONFIG.dates;

            const mainWrapper = document.getElementById('main-wrapper');
            const thumbWrapper = document.getElementById('thumb-wrapper');
            const pageIndicator = document.getElementById('page-indicator');

            const getPageLabel = (index) => {
                if (index === 0) return "Cover";
                return `Page ${index * 2 - 1}-${index * 2}`;
            };

            // --- Build slides ---
            for (let i = 0; i < CONFIG.totalImages; i++) {
                const label = getPageLabel(i);
                const fileName = `${CONFIG.imagePrefix}${i}.jpg`;

                // Main Slide
                const mainSlide = document.createElement('div');
                mainSlide.className = 'swiper-slide';
                mainSlide.innerHTML = `<img src="${fileName}" alt="${label}" class="main-image" loading="lazy">`;
                mainWrapper.appendChild(mainSlide);

                // Thumb Slide
                const thumbSlide = document.createElement('div');
                thumbSlide.className = 'swiper-slide';
                thumbSlide.innerHTML = `
                    <img src="${CONFIG.thumbnailFolder}${fileName}" alt="Thumbnail for ${label}" class="thumb-image" loading="lazy">
                    <div class="thumb-label">${label}</div>
                `;
                thumbWrapper.appendChild(thumbSlide);
            }

            pageIndicator.textContent = getPageLabel(0);

            // --- Initialize Swipers ---
            const thumbSwiper = new Swiper('.thumb-swiper', {
                spaceBetween: 15,
                slidesPerView: 6,
                watchSlidesProgress: true,
                breakpoints: {
                    320: { slidesPerView: 3 },
                    640: { slidesPerView: 4 },
                    1024: { slidesPerView: 6 }
                }
            });

            const mainSwiper = new Swiper('.main-viewer', {
                spaceBetween: 0,
                speed: 400,
                grabCursor: true,
                keyboard: {
                    enabled: true,
                },
                thumbs: {
                    swiper: thumbSwiper,
                },
                on: {
                    slideChange: function () {
                        pageIndicator.textContent = getPageLabel(this.activeIndex);
                    }
                }
            });

            // --- Navigation ---
            document.querySelector('.prev-zone').addEventListener('click', (e) => {
                e.stopPropagation();
                mainSwiper.slidePrev();
            });
            document.querySelector('.next-zone').addEventListener('click', (e) => {
                e.stopPropagation();
                mainSwiper.slideNext();
            });
        });
    </script>
</body>

</html>
